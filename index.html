<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Roza Siyam</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f172a"> <!-- Matched to your slate-900 background -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Roza Siyam">
  <link rel="apple-touch-icon" href="./icon.svg">
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Global Styles & Utilities */
    body {
      background-color: #020617; /* slate-950 */
      color: #f1f5f9; /* slate-100 */
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    
    ::selection {
      background-color: rgba(245, 158, 11, 0.3); /* amber-500/30 */
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 1rem);
    }

    /* Simple animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body>

  <!-- Mobile App Container -->
  <div class="w-full max-w-md bg-slate-900 shadow-2xl relative flex flex-col h-screen overflow-hidden sm:rounded-3xl sm:h-[95vh] sm:my-auto sm:border sm:border-slate-800">
    
    <!-- Header -->
    <header class="px-5 pt-10 pb-5 bg-gradient-to-b from-slate-800/80 to-slate-900 flex items-center justify-between relative z-50 border-b border-slate-800">
      
      <!-- Logo and Title -->
      <div class="flex items-center gap-3">
        <svg viewBox="0 0 100 100" class="w-10 h-10 drop-shadow-lg" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#fde047" />
              <stop offset="100%" stopColor="#d97706" />
            </linearGradient>
          </defs>
          <path d="M50 15A35 35 0 1 0 85 50 25 25 0 1 1 50 15Z" fill="url(#moonGradient)" />
          <polygon points="65,25 68,32 75,32 69,37 71,44 65,40 59,44 61,37 55,32 62,32" fill="#fde047" />
        </svg>
        <div>
          <h1 class="text-xl font-bold tracking-wide text-white leading-tight">Roza Siyam</h1>
          <p class="text-amber-400 text-[10px] font-medium tracking-wider uppercase">Ramadan 2026</p>
        </div>
      </div>

      <!-- City Selector UI (Searchable Dropdown) -->
      <div class="relative flex flex-col items-end">
        <div class="relative w-36 sm:w-44">
          <input type="text" id="city-search" placeholder="Search city..." autocomplete="off" 
                 class="w-full bg-slate-800/80 backdrop-blur-md text-slate-200 border border-slate-700/80 rounded-xl pl-3 pr-8 py-1.5 text-xs font-semibold tracking-wide outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500/50 shadow-inner transition-all hover:bg-slate-700 placeholder-slate-500 cursor-text">
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-amber-500">
            <!-- Search Icon -->
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </div>
          
          <!-- Dropdown List -->
          <ul id="city-dropdown" class="absolute right-0 top-full mt-2 w-52 max-h-60 overflow-y-auto bg-slate-800 border border-slate-700 rounded-xl shadow-2xl hidden flex-col divide-y divide-slate-700/50 hide-scrollbar z-50">
            <!-- Dynamically injected cities -->
          </ul>
        </div>
      </div>

    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto pb-24 px-6 hide-scrollbar relative mt-4">
      
      <!-- HOME TAB -->
      <div id="tab-home" class="space-y-6 animate-fade-in">
        
        <!-- Current Date Card -->
        <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-5 text-center">
          <p class="text-slate-400 text-sm uppercase tracking-widest mb-1">Today</p>
          <p id="display-date" class="text-lg text-slate-200 font-medium">Loading Date...</p>
          <div id="roza-badge-container" class="hidden mt-3">
            <div id="roza-badge" class="inline-block bg-amber-500/20 text-amber-300 px-4 py-1.5 rounded-full text-sm font-semibold shadow-inner">
              Roza --
            </div>
          </div>
        </div>

        <!-- Dynamic Countdown Section -->
        <div class="bg-gradient-to-br from-amber-600/20 to-orange-600/10 border border-amber-500/20 rounded-3xl p-8 flex flex-col items-center justify-center relative overflow-hidden shadow-lg shadow-amber-900/10 min-h-[220px]">
          <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl"></div>
          
          <!-- View: Loading -->
          <div id="view-loading" class="text-amber-200 animate-pulse text-center w-full">Fetching timings...</div>

          <!-- View: Before Ramadan -->
          <div id="view-before" class="hidden text-center w-full">
            <svg class="w-12 h-12 mx-auto text-amber-400 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <h2 class="text-2xl font-bold text-white mb-2">Ramadan is coming</h2>
            <p class="text-amber-200/70">Starts Feb 19, 2026</p>
          </div>

          <!-- View: After Ramadan -->
          <div id="view-after" class="hidden text-center w-full">
            <h2 class="text-2xl font-bold text-white mb-2">Eid Mubarak!</h2>
            <p class="text-amber-200/70">May your fasting be accepted.</p>
          </div>

          <!-- View: During Ramadan (Countdown) -->
          <div id="view-during" class="hidden w-full flex flex-col items-center">
            <p id="event-label" class="text-amber-300 font-medium uppercase tracking-widest mb-1">Event in</p>
            <p id="event-sublabel" class="text-amber-200/60 text-xs tracking-wider mb-5">At --:--</p>
            
            <div class="flex items-center justify-center gap-1.5 sm:gap-3 font-mono text-4xl sm:text-5xl font-light text-white tracking-tight tabular-nums">
              <div class="flex flex-col items-center">
                <span id="countdown-h" class="bg-slate-950/40 px-2 sm:px-4 py-2 sm:py-3 rounded-xl sm:rounded-2xl backdrop-blur-sm min-w-[64px] sm:min-w-[80px] text-center shadow-inner border border-slate-700/30">00</span>
                <span class="text-[10px] sm:text-xs font-sans text-amber-400/60 mt-2 uppercase tracking-widest">Hrs</span>
              </div>
              <span class="text-amber-500 pb-5 sm:pb-6">:</span>
              <div class="flex flex-col items-center">
                <span id="countdown-m" class="bg-slate-950/40 px-2 sm:px-4 py-2 sm:py-3 rounded-xl sm:rounded-2xl backdrop-blur-sm min-w-[64px] sm:min-w-[80px] text-center shadow-inner border border-slate-700/30">00</span>
                <span class="text-[10px] sm:text-xs font-sans text-amber-400/60 mt-2 uppercase tracking-widest">Min</span>
              </div>
              <span class="text-amber-500 pb-5 sm:pb-6">:</span>
              <div class="flex flex-col items-center">
                <span id="countdown-s" class="bg-slate-950/40 px-2 sm:px-4 py-2 sm:py-3 rounded-xl sm:rounded-2xl backdrop-blur-sm min-w-[64px] sm:min-w-[80px] text-center shadow-inner border border-slate-700/30 text-amber-400">00</span>
                <span class="text-[10px] sm:text-xs font-sans text-amber-400/60 mt-2 uppercase tracking-widest">Sec</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Target Day Timings Grid -->
        <div id="today-grid" class="hidden grid grid-cols-2 gap-4">
          <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 flex flex-col items-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-transparent"></div>
            <svg class="w-8 h-8 text-indigo-400 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <p class="text-slate-400 text-sm font-medium">Sehri Ends</p>
            <p class="text-2xl font-semibold text-white mt-1"><span id="sehr-time-display">--:--</span> <span class="text-sm font-normal text-slate-500">AM</span></p>
          </div>
          
          <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 flex flex-col items-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-orange-500/5 to-transparent"></div>
            <svg class="w-8 h-8 text-orange-400 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <p class="text-slate-400 text-sm font-medium">Iftar Time</p>
            <p class="text-2xl font-semibold text-white mt-1"><span id="iftar-time-display">--:--</span> <span class="text-sm font-normal text-slate-500">PM</span></p>
          </div>
        </div>

      </div>

      <!-- TIMETABLE TAB -->
      <div id="tab-timetable" class="hidden animate-fade-in">
        <div class="sticky top-0 bg-slate-900/95 backdrop-blur-md z-10 py-4 border-b border-slate-800 mb-4 flex justify-between text-xs font-semibold uppercase tracking-wider text-slate-400">
          <span>Roza & Date</span>
          <span class="flex gap-8 pr-2">
            <span>Sehr</span>
            <span>Iftar</span>
          </span>
        </div>
        <div id="timetable-list" class="space-y-3">
          <!-- Populated dynamically -->
        </div>
      </div>

    </main>

    <!-- Install Button (Styled for your theme and placed above bottom nav) -->
    <button id="install-btn" style="display: none; position: absolute; bottom: 90px; right: 20px; z-index: 50; padding: 10px 20px; background-color: #f59e0b; color: #0f172a; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); font-weight: bold; align-items: center; gap: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
        Install App
    </button>

    <!-- Bottom Navigation -->
    <nav class="absolute bottom-0 w-full bg-slate-900/90 backdrop-blur-xl border-t border-slate-800/80 px-6 py-4 flex justify-around pb-safe z-40">
      <button id="nav-home" onclick="switchTab('home')" class="flex flex-col items-center gap-1.5 transition-colors text-amber-400">
        <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-xs font-medium">Home</span>
      </button>
      
      <button id="nav-timetable" onclick="switchTab('timetable')" class="flex flex-col items-center gap-1.5 transition-colors text-slate-500 hover:text-slate-300">
        <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span class="text-xs font-medium">Timetable</span>
      </button>
    </nav>
  </div>

  <!-- Application Logic -->
  <script>
    // State Management
    let allCitiesData = {};
    let currentRamadanData = [];
    let timerInterval = null;
    let sortedCities = [];
    let currentSelectedCity = "";

    // DOM Elements
    const views = {
      loading: document.getElementById('view-loading'),
      before: document.getElementById('view-before'),
      after: document.getElementById('view-after'),
      during: document.getElementById('view-during')
    };

    const els = {
      citySearch: document.getElementById('city-search'),
      cityDropdown: document.getElementById('city-dropdown'),
      displayDate: document.getElementById('display-date'),
      rozaBadgeContainer: document.getElementById('roza-badge-container'),
      rozaBadge: document.getElementById('roza-badge'),
      eventLabel: document.getElementById('event-label'),
      eventSublabel: document.getElementById('event-sublabel'),
      countH: document.getElementById('countdown-h'),
      countM: document.getElementById('countdown-m'),
      countS: document.getElementById('countdown-s'),
      todayGrid: document.getElementById('today-grid'),
      sehrTime: document.getElementById('sehr-time-display'),
      iftarTime: document.getElementById('iftar-time-display'),
      timetableList: document.getElementById('timetable-list')
    };

    // Initialize App and Fetch Data
    async function initApp() {
      try {
        const response = await fetch('cities.json');
        if (!response.ok) throw new Error("Failed to fetch JSON");
        allCitiesData = await response.json();
        
        setupCitySelector();
        
        // Start processing logic
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
      } catch (error) {
        console.error("Error loading timing data:", error);
        views.loading.innerText = "Error loading timing data. Please check connection.";
      }
    }

    function setupCitySelector() {
      // 1. Sort cities A to Z
      sortedCities = Object.keys(allCitiesData).sort();
      
      // 2. Load from memory or default to first A-Z city
      const savedCity = localStorage.getItem('roza_siyam_city');
      if (savedCity && allCitiesData[savedCity]) {
        currentSelectedCity = savedCity;
      } else {
        currentSelectedCity = sortedCities[0];
      }
      
      currentRamadanData = allCitiesData[currentSelectedCity];
      els.citySearch.value = currentSelectedCity;

      // 3. Render initial dropdown items
      renderDropdown("");

      // 4. Setup Event Listeners for Search Bar
      els.citySearch.addEventListener('focus', () => {
        els.citySearch.value = ''; // Clear input so user can type
        els.cityDropdown.classList.remove('hidden');
        renderDropdown("");
      });

      els.citySearch.addEventListener('input', (e) => {
        renderDropdown(e.target.value);
      });

      // 5. Hide dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!els.citySearch.contains(e.target) && !els.cityDropdown.contains(e.target)) {
          els.cityDropdown.classList.add('hidden');
          // Revert the text back to the currently selected city
          els.citySearch.value = currentSelectedCity;
        }
      });
    }

    function renderDropdown(filterText) {
      const lowerFilter = filterText.toLowerCase();
      const filtered = sortedCities.filter(city => city.toLowerCase().includes(lowerFilter));
      
      els.cityDropdown.innerHTML = '';
      
      if (filtered.length === 0) {
        els.cityDropdown.innerHTML = '<li class="px-4 py-3 text-xs text-slate-400 text-center">No city found</li>';
        return;
      }

      filtered.forEach(city => {
        const li = document.createElement('li');
        li.className = 'px-4 py-2.5 text-xs text-slate-200 hover:bg-slate-700 cursor-pointer transition-colors';
        
        // Highlight active city
        if (city === currentSelectedCity) {
          li.classList.add('text-amber-400', 'bg-slate-700/50', 'font-bold');
        }
        
        li.innerText = city;
        li.addEventListener('click', () => {
          selectCity(city);
        });
        
        els.cityDropdown.appendChild(li);
      });
    }

    function selectCity(cityName) {
      currentSelectedCity = cityName;
      currentRamadanData = allCitiesData[cityName];
      localStorage.setItem('roza_siyam_city', cityName);
      
      els.citySearch.value = cityName;
      els.cityDropdown.classList.add('hidden');
      
      // Immediately update countdown/timings for new city
      updateTimer();
    }

    // Parse time strings to Date objects
    function parseTimeStr(dateStr, timeStr, isIftar) {
      const parts = timeStr.split(':');
      const hours = parseInt(parts[0], 10);
      const mins = parseInt(parts[1], 10);
      const adjustedHours = isIftar ? hours + 12 : hours; // Iftar is PM, Sehr is AM
      return new Date(`${dateStr}T${String(adjustedHours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:00`);
    }

    function formatDisplayDate(date) {
      return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }

    function formatDisplayDateShort(date) {
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function padZero(num) {
      return String(num).padStart(2, '0');
    }

    function setView(viewName) {
      Object.keys(views).forEach(key => {
        if (key === viewName) {
          views[key].classList.remove('hidden');
        } else {
          views[key].classList.add('hidden');
        }
      });
    }

    // Render Timetable
    function renderTimetable(currentDayNumber) {
      if (!currentRamadanData || currentRamadanData.length === 0) return;

      let html = '';
      currentRamadanData.forEach(dayData => {
        const isActive = currentDayNumber === dayData.day;
        const dateObj = new Date(`${dayData.date}T00:00:00`);
        const formattedDate = formatDisplayDateShort(dateObj);
        
        const containerClasses = isActive 
          ? 'bg-amber-950/30 border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.1)]' 
          : 'bg-slate-800/40 border-slate-700/50 hover:bg-slate-800';
          
        const circleClasses = isActive ? 'bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300';
        const textClasses = isActive ? 'text-amber-400' : 'text-slate-200';
        const timeClasses = isActive ? 'text-white font-semibold' : 'text-slate-300';

        html += `
          <div class="flex items-center justify-between p-4 rounded-2xl border transition-all ${containerClasses}">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold ${circleClasses}">
                ${dayData.day}
              </div>
              <div>
                <p class="font-medium ${textClasses}">${formattedDate}</p>
              </div>
            </div>
            <div class="flex items-center gap-6 font-mono text-sm">
              <div class="flex flex-col items-end">
                <span class="${timeClasses}">${dayData.sehr}</span>
              </div>
              <div class="flex flex-col items-end">
                <span class="${timeClasses}">${dayData.iftar}</span>
              </div>
            </div>
          </div>
        `;
      });
      els.timetableList.innerHTML = html;
    }

    // Core Timer Logic
    function updateTimer() {
      if (!currentRamadanData || currentRamadanData.length === 0) return;

      const now = new Date();
      els.displayDate.innerText = formatDisplayDate(now);

      const firstDayDate = new Date(`${currentRamadanData[0].date}T00:00:00`);
      const lastDayDate = new Date(`${currentRamadanData[currentRamadanData.length - 1].date}T23:59:59`);

      if (now < firstDayDate) {
        setView('before');
        renderTimetable(null);
        els.todayGrid.classList.add('hidden');
        els.rozaBadgeContainer.classList.add('hidden');
        return;
      }

      if (now > lastDayDate) {
        setView('after');
        renderTimetable(null);
        els.todayGrid.classList.add('hidden');
        els.rozaBadgeContainer.classList.add('hidden');
        return;
      }

      // Find initial current day based on local date
      const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
      let activeDataIndex = currentRamadanData.findIndex(d => d.date === todayStr);

      if (activeDataIndex === -1) {
        setView('after');
        return;
      }

      let activeData = currentRamadanData[activeDataIndex];
      let sehrTime = parseTimeStr(activeData.date, activeData.sehr, false);
      let iftarTime = parseTimeStr(activeData.date, activeData.iftar, true);

      // Adaptable Logic: If today's iftar has passed, smoothly switch focus to Tomorrow's Roza!
      if (now > iftarTime) {
        if (activeDataIndex + 1 < currentRamadanData.length) {
          activeDataIndex++;
          activeData = currentRamadanData[activeDataIndex];
          sehrTime = parseTimeStr(activeData.date, activeData.sehr, false);
          iftarTime = parseTimeStr(activeData.date, activeData.iftar, true);
        } else {
          setView('after');
          return;
        }
      }

      // Update UI elements for the currently active target day
      els.rozaBadgeContainer.classList.remove('hidden');
      els.rozaBadge.innerText = `Roza ${activeData.day}`;
      els.todayGrid.classList.remove('hidden');
      els.sehrTime.innerText = activeData.sehr;
      els.iftarTime.innerText = activeData.iftar;

      let nextEvent = null;

      if (now < sehrTime) {
        nextEvent = { 
          time: sehrTime, 
          label: `Roza ${activeData.day} Sehr Ends In`,
          subLabel: `At ${activeData.sehr} AM, ${formatDisplayDateShort(sehrTime)}`
        };
      } else {
        // Between Sehr and Iftar
        nextEvent = { 
          time: iftarTime, 
          label: `Roza ${activeData.day} Iftar In`,
          subLabel: `At ${activeData.iftar} PM, ${formatDisplayDateShort(iftarTime)}`
        };
      }

      // Calculate Difference
      const diffMs = nextEvent.time - now;
      const h = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diffMs / 1000 / 60) % 60);
      const s = Math.floor((diffMs / 1000) % 60);

      // Render countdown text
      setView('during');
      els.eventLabel.innerText = nextEvent.label;
      els.eventSublabel.innerText = nextEvent.subLabel;
      els.countH.innerText = padZero(h);
      els.countM.innerText = padZero(m);
      els.countS.innerText = padZero(s);

      // Render Timetable (highlights the active day)
      renderTimetable(activeData.day);
    }

    // Tab Navigation Logic
    function switchTab(tabId) {
      const tabHome = document.getElementById('tab-home');
      const tabTimetable = document.getElementById('tab-timetable');
      const navHome = document.getElementById('nav-home');
      const navTimetable = document.getElementById('nav-timetable');

      if (tabId === 'home') {
        tabHome.classList.remove('hidden');
        tabTimetable.classList.add('hidden');
        
        navHome.classList.add('text-amber-400');
        navHome.classList.remove('text-slate-500', 'hover:text-slate-300');
        
        navTimetable.classList.remove('text-amber-400');
        navTimetable.classList.add('text-slate-500', 'hover:text-slate-300');
      } else {
        tabHome.classList.add('hidden');
        tabTimetable.classList.remove('hidden');
        
        navTimetable.classList.add('text-amber-400');
        navTimetable.classList.remove('text-slate-500', 'hover:text-slate-300');
        
        navHome.classList.remove('text-amber-400');
        navHome.classList.add('text-slate-500', 'hover:text-slate-300');
      }
    }

    // Start App when DOM is loaded
    document.addEventListener('DOMContentLoaded', initApp);

    // ==========================================
    // PWA REGISTRATION AND INSTALL LOGIC
    // ==========================================

    // 1. Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered.'))
                .catch(err => console.log('Service Worker Registration Failed.', err));
        });
    }

    // 2. Handle Install Prompt & Button
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        deferredPrompt = e;
        // Update UI notify the user they can install the PWA
        if (installBtn) installBtn.style.display = 'flex';
    });

    if (installBtn) {
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Show the install prompt
                deferredPrompt.prompt();
                // Wait for the user to respond to the prompt
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User ${outcome} the install prompt`);
                // We've used the prompt, and can't use it again, throw it away
                deferredPrompt = null;
                // Hide the install button
                installBtn.style.display = 'none';
            }
        });
    }

    window.addEventListener('appinstalled', () => {
        // Hide the app-provided install promotion
        if (installBtn) installBtn.style.display = 'none';
        // Clear the deferredPrompt so it can be garbage collected
        deferredPrompt = null;
        console.log('App was successfully installed');
    });

  </script>
</body>
</html>
